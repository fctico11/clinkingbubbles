<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <!-- Local Business Schema -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Clinking Bubbles",
        "logo": "https://www.clinkingbubbles.com/assets/mainlogo-v1.png",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "1600 Justin Place",
          "addressLocality": "Mountainside",
          "addressRegion": "NJ",
          "postalCode": "07092"
        },
        "telephone": "9084148584",
        "url": "https://www.clinkingbubbles.com",
        "areaServed": "NJ, NY",
        "description": "Private bartending services in NJ that elevate events with curated cocktails and professional service."
      }
    </script>

  <!-- DNS Prefetch for external resources -->
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>

  <!-- Preload mobile hero image for mobile devices -->
  <link rel="preload" as="image" href="/images/mobile/herocar4-mobile.webp" media="(max-width: 768px)" type="image/webp"
    fetchpriority="high" />
  <!-- Preload desktop hero image for desktop -->
  <link rel="preload" as="image" href="/images/herocar4.webp" media="(min-width: 769px)" type="image/webp"
    fetchpriority="high" />

  <!-- Preload LCP logo image (imagesrcset/imagesizes mirror the <img> so the same file is chosen) -->
  <link rel="preload" as="image" type="image/webp" fetchpriority="high"
    imagesrcset="/images/logos/whiteTransparentLogo-small.webp 400w, /images/logos/whiteTransparentLogo-large.webp 1024w"
    imagesizes="(max-width: 768px) 208px, 384px" />

  <!-- Preload display fonts (WOFF2) so text doesn't wait on the CSS -> font chain -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/VELISTA.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/fonts/AppleGaramond.woff2" crossorigin />


  <!-- Critical CSS for immediate render -->
  <style>
    /* Display fonts (preloaded above) */
    @font-face {
      font-family: 'ClinkingBubblesFont';
      src: url('/fonts/VELISTA.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'BubblesFont';
      src: url('/fonts/AppleGaramond.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* Expanded critical CSS - hero, navbar, buttons (~2.7KB) */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
    }

    /* Hero section critical styles */
    .h-screen {
      height: 100vh;
    }

    .flex {
      display: flex;
    }

    .items-center {
      align-items: center;
    }

    .justify-center {
      justify-content: center;
    }

    .justify-between {
      justify-content: space-between;
    }

    .relative {
      position: relative;
    }

    .absolute {
      position: absolute;
    }

    .fixed {
      position: fixed;
    }

    .inset-0 {
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    .object-cover {
      object-fit: cover;
    }

    .w-full {
      width: 100%;
    }

    .h-full {
      height: 100%;
    }

    .opacity-0 {
      opacity: 0;
    }

    .opacity-100 {
      opacity: 1;
    }

    .transition-opacity {
      transition-property: opacity;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 150ms;
    }

    .text-white {
      color: rgb(255 255 255);
    }

    .text-center {
      text-align: center;
    }

    .overflow-hidden {
      overflow: hidden;
    }

    .z-0 {
      z-index: 0;
    }

    .z-10 {
      z-index: 10;
    }

    .z-20 {
      z-index: 20;
    }

    /* Navbar critical styles */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
    }

    .bg-transparent {
      background-color: transparent;
    }

    .bg-opacity-90 {
      --tw-bg-opacity: 0.9;
    }

    .backdrop-blur-md {
      backdrop-filter: blur(12px);
    }

    .px-4 {
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .py-3 {
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }

    .px-6 {
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    .py-2 {
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
    }

    .gap-6 {
      gap: 1.5rem;
    }

    .gap-8 {
      gap: 2rem;
    }

    .hidden {
      display: none;
    }

    .cursor-pointer {
      cursor: pointer;
    }

    /* Button critical styles */
    .bg-yellow-500 {
      background-color: rgb(234 179 8);
    }

    .bg-amber-500 {
      background-color: rgb(245 158 11);
    }

    .text-black {
      color: rgb(0 0 0);
    }

    .rounded-lg {
      border-radius: 0.5rem;
    }

    .font-semibold {
      font-weight: 600;
    }

    .hover\:bg-yellow-400:hover {
      background-color: rgb(250 204 21);
    }

    .hover\:bg-amber-400:hover {
      background-color: rgb(251 191 36);
    }

    .transition {
      transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 150ms;
    }

    /* Common spacing */
    .mb-4 {
      margin-bottom: 1rem;
    }

    .mb-6 {
      margin-bottom: 1.5rem;
    }

    .mt-4 {
      margin-top: 1rem;
    }

    /* Static hero pre-paint (removed when React mounts) */
    #static-hero {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      color: #fff;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #static-hero .sh-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #static-hero .sh-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    #static-hero .sh-nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      box-sizing: border-box;
    }

    #static-hero .sh-brand {
      font-family: 'ClinkingBubblesFont', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      line-height: 1.75rem;
      color: #eab308;
    }

    #static-hero .sh-menu {
      color: #eab308;
      display: block;
    }

    #static-hero .sh-content {
      position: relative;
      max-width: 48rem;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #static-hero .sh-logo {
      width: 13rem;
      height: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 2px black);
    }

    #static-hero .sh-h1 {
      font-family: 'ClinkingBubblesFont', sans-serif;
      font-size: 1.875rem;
      line-height: 2.25rem;
      font-weight: 700;
      margin: 0 0 1rem;
      filter: drop-shadow(0 0 2px black);
    }

    #static-hero .sh-pill {
      backdrop-filter: blur(4px);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0.75rem;
      padding: 0.5rem 1rem;
      display: inline-block;
    }

    #static-hero .sh-h2 {
      font-family: 'BubblesFont', sans-serif;
      font-size: 1.5rem;
      line-height: 2rem;
      margin: 0;
      filter: drop-shadow(0 0 2px black);
    }

    #static-hero .sh-btnwrap {
      margin-top: 1.5rem;
    }

    #static-hero .sh-btn {
      display: inline-block;
      font-family: 'BubblesFont', sans-serif;
      font-size: 1.125rem;
      line-height: 1.75rem;
      font-weight: 600;
      color: #000;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      background: linear-gradient(135deg, #e6c34d 0%, #c9952e 50%, #e6c34d 100%);
      background-size: 200% 200%;
      box-shadow: 0 3px 12px rgba(201, 149, 46, 0.35);
    }

    @media (min-width: 640px) {
      #static-hero .sh-btnwrap {
        margin-top: 0.75rem;
      }
    }

    @media (min-width: 768px) {
      #static-hero .sh-menu {
        display: none;
      }

      #static-hero .sh-brand {
        font-size: 1.875rem;
        line-height: 2.25rem;
      }

      #static-hero .sh-logo {
        width: 24rem;
        margin-bottom: 1.5rem;
      }

      #static-hero .sh-h1 {
        font-size: 3.75rem;
        line-height: 1;
        white-space: nowrap;
      }
    }

    /* Responsive utilities */
    @media (min-width: 768px) {
      .md\:flex {
        display: flex;
      }

      .md\:hidden {
        display: none;
      }

      .md\:w-96 {
        width: 24rem;
      }

      .md\:mb-6 {
        margin-bottom: 1.5rem;
      }

      .md\:px-8 {
        padding-left: 2rem;
        padding-right: 2rem;
      }

      .md\:py-4 {
        padding-top: 1rem;
        padding-bottom: 1rem;
      }
    }
  </style>

  <!--Icons -->
  <link rel="apple-touch-icon" href="/assets/mainlogo-v1-180.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/mainlogo-v1-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/mainlogo-v1-16.png" />
  <link rel="shortcut icon" href="/assets/favicon-v1.ico" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16963394733">
  </script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'AW-16963394733');
  </script>

  <!-- Stylesheets (emitted here because automatic injection is disabled) -->
  <% htmlWebpackPlugin.files.css.forEach(function (href) { %>
  <link rel="stylesheet" href="<%= href %>" />
  <% }); %>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <!-- Static hero pre-paint: pixel-identical copy of the React hero so the
       browser (and LCP) paints at first render instead of waiting for the JS
       bundle. Removed by HeroSection on mount; instantly removed on non-home
       routes by the inline script below. -->
  <div id="static-hero" aria-hidden="true">
    <picture>
      <source type="image/webp" media="(max-width: 768px)" srcset="/images/mobile/herocar4-mobile.webp" />
      <img class="sh-bg" src="/images/herocar4.webp" alt="" />
    </picture>
    <div class="sh-overlay"></div>
    <div class="sh-nav">
      <span class="sh-brand">Clinking Bubbles</span>
      <svg class="sh-menu" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </div>
    <div class="sh-content">
      <img class="sh-logo" src="/images/logos/whiteTransparentLogo-large.webp"
        srcset="/images/logos/whiteTransparentLogo-small.webp 400w, /images/logos/whiteTransparentLogo-large.webp 1024w"
        sizes="(max-width: 768px) 208px, 384px" width="400" height="345" alt="" fetchpriority="high" />
      <div class="sh-h1">NJ Private Bartending</div>
      <div class="sh-pill">
        <div class="sh-h2">Elevate Your Experience</div>
      </div>
      <div class="sh-btnwrap"><span class="sh-btn">Book Now</span></div>
    </div>
  </div>
  <script>
    if (window.location.pathname !== '/' && window.location.pathname !== '') {
      document.getElementById('static-hero').remove();
    }
  </script>

  <div id="root"></div>

  <!-- Load the app bundles only after the browser's first paint so the
       static hero above is never delayed by the JS download. async=false
       preserves execution order; the timeout covers hidden/background tabs
       where requestAnimationFrame doesn't fire. -->
  <script>
    (function () {
      var srcs = <%= JSON.stringify(htmlWebpackPlugin.files.js) %>;
      var loaded = false;
      function loadApp() {
        if (loaded) return;
        loaded = true;
        srcs.forEach(function (src) {
          var el = document.createElement('script');
          el.src = src;
          el.async = false;
          document.body.appendChild(el);
        });
      }
      requestAnimationFrame(function () { requestAnimationFrame(loadApp); });
      setTimeout(loadApp, 350);
    })();
  </script>
</body>

</html>
